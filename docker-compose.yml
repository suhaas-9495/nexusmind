version: "3.9"

services:

  # ── NexusMind API ─────────────────────────────────────────────────────────
  nexusmind:
    build: .
    container_name: nexusmind_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - QDRANT_URL=http://qdrant:6333
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-CHANGE_ME_IN_PRODUCTION_32CHARS}
      - LLM_MODEL=${LLM_MODEL:-llama3}
      - EMBED_MODEL=${EMBED_MODEL:-nomic-embed-text}
      - TOP_K=${TOP_K:-5}
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      qdrant:
        condition: service_healthy
    networks:
      - nexusmind_net

  # ── Qdrant Vector DB ──────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: nexusmind_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexusmind_net

  # ── Ollama LLM runtime ────────────────────────────────────────────────────
  # NOTE: Comment this out if running Ollama natively on your host.
  # For GPU support, add: deploy: resources: reservations: devices: [{driver: nvidia, ...}]
  ollama:
    image: ollama/ollama:latest
    container_name: nexusmind_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - nexusmind_net

volumes:
  qdrant_data:
  ollama_data:

networks:
  nexusmind_net:
    driver: bridge
